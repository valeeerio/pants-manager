services:
  mysql:
    image: mysql:8.4
    container_name: pants-manager-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pants_manager
      MYSQL_USER: pants
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
